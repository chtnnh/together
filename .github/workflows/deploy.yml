name: Deploy

# Deploys the Cloudflare Worker (services/realtime) after CI passes on main.
# The Next.js web app (apps/web) deploys automatically via the Vercel Git
# integration on push to main — no workflow step is needed here. Configure the
# Vercel project to point at apps/web and set its env vars in the Vercel
# dashboard (DATABASE_URL, YOUTUBE_API_KEY, NEXT_PUBLIC_*, ROOM_TOKEN_SECRET, …).
#
# Secrets are read from the "production" GitHub Environment (Settings →
# Environments → production). The job below must declare `environment:` with the
# same name or the secrets resolve to empty strings. Required secrets:
#   CLOUDFLARE_API_TOKEN   - token with "Edit Cloudflare Workers" permission
#                            (+ Zone DNS:Edit for the custom domain)
#   CLOUDFLARE_ACCOUNT_ID  - target Cloudflare account id

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-realtime
  cancel-in-progress: false

jobs:
  deploy-realtime:
    # Only deploy when the CI run that triggered this succeeded.
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    # Must match the GitHub Environment that holds the Cloudflare secrets.
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy Cloudflare Worker
        # `run` is required: `pnpm --filter <pkg> deploy` hits pnpm's built-in
        # deploy command instead of the package's deploy script.
        run: pnpm --filter @together/realtime run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
